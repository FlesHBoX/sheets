<!DOCTYPE html>
<html lang="en">
<head>
<meta name="color-scheme" content="dark">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Edit only the below meta tags -->
<meta property="og:title" content="ATNAS GREYSTAG" />
<meta property="og:description" content="Plumekith Aasimar · Warden · Level 5 — &quot;Justice doesn't announce itself.&quot;" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://fleshbox.github.io/sheets/atnas/" />
<meta property="og:image" content="https://fleshbox.github.io/sheets/atnas/portrait.png" />
<!-- Edit only the above meta tags -->

<title>Character Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../sheet.css">
</head>
<body>
<div class="page">
  <div class="header">
    <h1 class="character-name"></h1>
    <p class="character-subtitle"></p>
    <p class="character-quote"></p>
  </div>
  <div class="section" style="text-align:center;">
    <img id="portrait-img" src="" alt=""
      style="max-width:420px;width:100%;border-radius:6px;border:1px solid var(--border);
        box-shadow:0 0 40px var(--primary-dim), 0 0 80px var(--accent-dim);cursor:pointer;"
      onclick="document.getElementById('lb').classList.add('active')">
  </div>
  <div class="section">
    <div class="section-title">Identity</div>
    <div class="identity-grid"></div>
  </div>
  <div class="section">
    <div class="section-title">Appearance</div>
    <div class="appearance-block"><ul></ul></div>
  </div>
  <div class="section">
    <div class="section-title">Ability Scores</div>
    <div class="stats-grid"></div>
    <div class="note-box ability-scores-note"></div>
  </div>
  <div class="section">
    <div class="section-title">Combat</div>
    <div class="combat-grid"></div>
    <table id="weapons-table">
      <thead><tr><th>Weapon</th><th>Attack</th><th>Damage</th><th>Crit</th><th>Notes</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="section">
    <div class="section-title">Class Features</div>
    <div class="class-features-grid"></div>
    <div class="note-box class-features-note"></div>
  </div>
  <div class="section">
    <div class="section-title">Feats</div>
    <table id="feats-table">
      <thead><tr><th>Level</th><th>Feat</th><th>Notes</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="section">
    <div class="section-title">Skills</div>
    <table id="skills-table">
      <thead><tr><th>Skill</th><th>Ranks</th><th>Stat</th><th>Class</th><th>Total</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="note-box skills-note"></div>
  </div>
  <div class="section">
    <div class="section-title racial-title">Racial Traits</div>
    <ul class="feature-list racial-traits-list"></ul>
  </div>
  <div class="section">
    <div class="section-title">Equipment</div>
    <table id="equipment-table">
      <thead><tr><th>Item</th><th>Notes</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Magic / Formulae -->
  <div class="section" id="magic-section">
    <div class="section-title magic-section-title">Formulae</div>
    <div class="magic-slots"></div>
    <div class="magic-prepared-header">Prepared</div>
    <ul class="magic-prepared-list"></ul>
    <button class="magic-spellbook-btn">Open Formula Book</button>
  </div>
  <div class="divider"></div>
  <div class="section">
    <div class="section-title">Backstory &amp; Lore</div>
    <div class="lore-container"></div>
  </div>

  <div class="footer"></div>
</div>
<div id="lb" class="lightbox-overlay" onclick="this.classList.remove('active')">
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Spell detail modal -->
<div class="sheet-modal" id="spell-modal" role="dialog" aria-modal="true">
  <div class="sheet-modal-inner">
    <button class="modal-close-btn" aria-label="Close">✕</button>
    <div class="spell-modal-name"></div>
    <span class="spell-modal-meta"></span>
    <div class="spell-modal-stats">
      <span class="spell-modal-casting"></span>
      <span class="spell-modal-range"></span>
      <span class="spell-modal-duration"></span>
      <span class="spell-modal-target"></span>
      <span class="spell-modal-save"></span>
    </div>
    <div class="spell-modal-description"></div>
  </div>
</div>

<!-- Spellbook / Formula Book modal -->
<div class="sheet-modal" id="spellbook-modal" role="dialog" aria-modal="true">
  <div class="sheet-modal-inner">
    <button class="modal-close-btn" aria-label="Close">✕</button>
    <div class="spellbook-modal-title"></div>
    <div class="spellbook-list"></div>
  </div>
</div>

<script src="../sheet.js"></script>
</body>
</html>
