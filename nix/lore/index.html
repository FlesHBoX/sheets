<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lore</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../sheet.css">
<style>
  /* ── LORE PAGE LAYOUT ── */
  .lore-page {
    max-width: 680px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  /* ── LORE NAV ── */
  .lore-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    gap: 1rem;
    flex-wrap: wrap;
  }

  .lore-nav-back {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--text-dim);
    transition: color 0.15s;
    white-space: nowrap;
  }

  .lore-nav-back:hover { color: var(--primary); }
  .lore-nav-back::before { content: '← '; }

  .lore-nav-entries {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .lore-nav-entry {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.3rem 0.7rem;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .lore-nav-entry:hover { color: var(--primary); border-color: var(--primary); }
  .lore-nav-entry.active { color: var(--primary); border-color: var(--primary); background: var(--primary-dim); }

  /* ── LORE TITLE ── */
  .lore-page-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--primary);
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }

  .lore-page-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
    margin-bottom: 2.5rem;
    opacity: 0.5;
  }

  /* ── PROSE ── */
  .lore-prose p {
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text);
    margin-bottom: 1.25rem;
  }

  .lore-prose p:last-child { margin-bottom: 0; }
  .lore-prose em  { color: var(--accent); font-style: italic; }
  .lore-prose strong { color: var(--primary); }

  /* ── LORE BLOCKS (reuses sheet styles) ── */
  .lore-page .lore-block p { font-size: 1rem; line-height: 1.8; }

  /* ── ERROR STATE ── */
  .lore-error {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-style: italic;
  }
</style>
</head>
<body>
<div class="lore-page">
  <nav class="lore-nav">
    <a class="lore-nav-back" id="back-link" href="../">Character Sheet</a>
    <div class="lore-nav-entries" id="lore-nav-entries"></div>
  </nav>

  <div id="lore-content">
    <!-- populated by JS -->
  </div>
</div>

<script>
// ── Markdown-lite renderer ─────────────────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return '';
  return text.split('\n\n').map(para => {
    const html = para
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
    return `<p>${html}</p>`;
  }).join('');
}

function renderInline(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');
}

// ── Theme application ──────────────────────────────────────────────────────
function applyTheme(theme) {
  const root = document.documentElement;
  const map = {
    shadow: '--shadow', deep: '--deep', surface: '--surface',
    raised: '--raised', border: '--border', muted: '--muted',
    text: '--text', textDim: '--text-dim', primary: '--primary', accent: '--accent',
  };
  for (const [key, cssVar] of Object.entries(map)) {
    if (theme[key]) root.style.setProperty(cssVar, theme[key]);
  }
  const hexToRgb = hex => {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `${r}, ${g}, ${b}`;
  };
  if (theme.primary) {
    const rgb = hexToRgb(theme.primary);
    root.style.setProperty('--primary-dim',  `rgba(${rgb}, 0.15)`);
    root.style.setProperty('--primary-glow', `rgba(${rgb}, 0.4)`);
  }
  if (theme.accent) {
    const rgb = hexToRgb(theme.accent);
    root.style.setProperty('--accent-dim',  `rgba(${rgb}, 0.12)`);
    root.style.setProperty('--accent-glow', `rgba(${rgb}, 0.4)`);
  }
}

// ── Render lore entry ──────────────────────────────────────────────────────
function renderLoreEntry(entry) {
  const container = document.getElementById('lore-content');

  let html = `
    <h1 class="lore-page-title">${entry.title}</h1>
    <div class="lore-page-divider"></div>
  `;

  // Plain prose
  if (entry.content) {
    html += `<div class="lore-prose">${renderMarkdown(entry.content)}</div>`;
  }

  // Lore blocks (same schema as character.json lore)
  if (entry.blocks) {
    html += entry.blocks.map(block => {
      let inner = '';
      if (block.content)   inner += renderMarkdown(block.content);
      if (block.incidents) inner += `<div class="incidents">` + block.incidents.map(inc =>
        `<div class="incident${inc.variant === 'accent' ? ' accent' : ''}">${inc.text}</div>`
      ).join('') + `</div>`;
      if (block.hooks) inner += `<ul class="hook-list">` + block.hooks.map(h => `<li>${h}</li>`).join('') + `</ul>`;
      const titleNote = block.titleNote ? ` <span class="lore-title-note">${block.titleNote}</span>` : '';
      return `
        <div class="lore-block ${block.accent === 'primary' ? 'primary-accent' : 'accent-accent'}">
          <div class="lore-title">${block.title}${titleNote}</div>
          ${inner}
        </div>
      `;
    }).join('');
  }

  container.innerHTML = html;
  document.title = `${entry.title} — Lore`;
}

// ── Build nav ──────────────────────────────────────────────────────────────
function buildNav(entries, currentId) {
  const nav = document.getElementById('lore-nav-entries');
  nav.innerHTML = entries.map(e => `
    <a class="lore-nav-entry${e.id === currentId ? ' active' : ''}"
       href="${e.shareUrl || `./#${e.id}`}">${e.title}</a>
  `).join('');
}

// ── Main loader ────────────────────────────────────────────────────────────
async function loadLore() {
  const id = window.location.hash.slice(1);

  if (!id) {
    document.getElementById('lore-content').innerHTML =
      `<div class="lore-error">No lore entry specified.</div>`;
    document.body.classList.add('loaded');
    return;
  }

  try {
    // Fetch character theme, lore index, and lore entry in parallel
    const [charRes, indexRes, entryRes] = await Promise.all([
      fetch('../character.json'),
      fetch('./index.json'),
      fetch(`./${id}.json`),
    ]);

    if (charRes.ok) {
      const char = await charRes.json();
      applyTheme(char.theme);
      // Update back link with character name
      const backLink = document.getElementById('back-link');
      backLink.textContent = `${char.header.name} — Character Sheet`;
      backLink.setAttribute('href', '../');
    }

    const entries = indexRes.ok ? await indexRes.json() : [];
    buildNav(entries, id);

    if (!entryRes.ok) throw new Error(`Lore entry "${id}" not found.`);
    const entry = await entryRes.json();
    renderLoreEntry(entry);

    document.body.classList.add('loaded');

  } catch (err) {
    document.getElementById('lore-content').innerHTML =
      `<div class="lore-error">${err.message}</div>`;
    document.body.classList.add('loaded');
  }
}

// Reload on hash change (navigate between entries without page reload)
window.addEventListener('hashchange', loadLore);
document.addEventListener('DOMContentLoaded', loadLore);
</script>
</body>
</html>
