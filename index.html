<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Character Roster" />
<meta property="og:description" content="A collection of character sheets." />
<meta property="og:type" content="website" />
<title>Character Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --shadow:  #0a0a0f;
    --deep:    #0f0f1a;
    --surface: #141420;
    --raised:  #1a1a2e;
    --border:  #2a2a3e;
    --muted:   #4a4a6a;
    --text:    #c8c8d8;
    --text-dim:#7a7a9a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--shadow);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  body.loaded { opacity: 1; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 4rem 1.5rem 6rem;
  }

  .site-header {
    text-align: center;
    margin-bottom: 4rem;
    position: relative;
  }

  .site-header::after {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin-top: 2rem;
  }

  .site-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 400;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .site-subtitle {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--muted);
  }

  .roster {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 1.5rem;
  }

  @media (max-width: 500px) {
    .roster { grid-template-columns: 1fr; }
  }

  .character-card {
    display: flex;
    align-items: stretch;
    background: var(--raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    position: relative;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.3s ease;
    animation: fadeUp 0.5s ease both;
  }

  .character-card:hover {
    transform: translateY(-3px);
  }

  .card-portrait {
    width: 120px;
    min-width: 120px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .card-portrait img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
    transition: transform 0.4s ease;
    filter: saturate(0.85);
  }

  .character-card:hover .card-portrait img {
    transform: scale(1.04);
    filter: saturate(1);
  }

  .card-portrait::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 60%, var(--raised) 100%);
  }

  .card-body {
    padding: 1.25rem 1.4rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.35rem;
    flex: 1;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    line-height: 1;
  }

  .card-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .card-quote {
    font-style: italic;
    font-size: 0.9rem;
    margin-top: 0.25rem;
    line-height: 1.4;
    opacity: 0.85;
  }

  .card-arrow {
    position: absolute;
    bottom: 1rem;
    right: 1.1rem;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .character-card:hover .card-arrow {
    opacity: 1;
    transform: translateX(3px);
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    font-style: italic;
    font-size: 0.95rem;
  }

  .site-footer {
    text-align: center;
    margin-top: 5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .howto-link {
    display: inline-block;
    margin-top: 1rem;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.4rem 0.9rem;
    transition: color 0.2s, border-color 0.2s;
  }
  .howto-link:hover {
    color: var(--primary);
    border-color: var(--primary);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <h1 class="site-title">Character Roster</h1>
    <p class="site-subtitle">Select a character to view their sheet.</p>
    <a href="./howto/" class="howto-link">◆ How To Add a Character</a>
  </header>

  <div class="roster" id="roster"></div>

  <footer class="site-footer">FlesHBoX &nbsp;·&nbsp; D&amp;D Character Sheets</footer>

</div>
<script>
async function loadRoster() {
  try {
    const res = await fetch('./roster.json');
    if (!res.ok) throw new Error('Could not load roster.');
    const characters = await res.json();
    const container = document.getElementById('roster');

    if (!characters.length) {
      container.innerHTML = '<div class="empty-state">No characters yet.</div>';
      document.body.classList.add('loaded');
      return;
    }

    container.innerHTML = characters.map((c, i) => {
      const pRgb = hexToRgb(c.primary);
      const aRgb = hexToRgb(c.accent);
      return `
        <a class="character-card" href="${c.href}"
          style="
            border-color: rgba(${pRgb}, 0.25);
            box-shadow: 0 0 20px rgba(${pRgb}, 0.06), 0 0 40px rgba(${aRgb}, 0.04);
            animation-delay: ${i * 0.08}s;
          "
          onmouseenter="this.style.borderColor='rgba(${pRgb}, 0.6)'; this.style.boxShadow='0 0 30px rgba(${pRgb}, 0.2), 0 0 60px rgba(${aRgb}, 0.12)';"
          onmouseleave="this.style.borderColor='rgba(${pRgb}, 0.25)'; this.style.boxShadow='0 0 20px rgba(${pRgb}, 0.06), 0 0 40px rgba(${aRgb}, 0.04)';"
        >
          <div class="card-portrait">
            <img src="${c.portrait}" alt="${c.name}" loading="lazy" onerror="this.style.display='none'">
          </div>
          <div class="card-body">
            <div class="card-name" style="color:${c.primary}">${c.name}</div>
            <div class="card-subtitle">${c.subtitle}</div>
            <div class="card-quote" style="color:${c.accent}">${c.quote}</div>
          </div>
          <span class="card-arrow" style="color:${c.primary}">View Sheet →</span>
        </a>
      `;
    }).join('');

    document.body.classList.add('loaded');

  } catch (err) {
    document.getElementById('roster').innerHTML =
      `<div class="empty-state">${err.message}</div>`;
    document.body.classList.add('loaded');
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `${r}, ${g}, ${b}`;
}

document.addEventListener('DOMContentLoaded', loadRoster);
</script>
</body>
</html>
